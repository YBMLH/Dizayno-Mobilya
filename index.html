<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dizayno Mobilya — Carte de visite</title>
<meta name="description" content="Dizayno Mobilya — Mobilier & décoration. Enregistrez notre contact, appelez-nous ou visitez notre showroom.">
<meta name="theme-color" content="#0B0B0C">
<script>
  /* Apply saved/preferred theme before first paint to avoid any flash */
  (function(){
    try{
      var saved = localStorage.getItem("dm-theme");
      var prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
      var theme = saved || (prefersLight ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);
    }catch(e){ document.documentElement.setAttribute("data-theme","dark"); }
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,500;0,700;0,800;0,900;1,800;1,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     ▼▼▼  VOS INFORMATIONS — modifiez uniquement ce bloc  ▼▼▼
     (Tout en bas de page, dans <script>, se trouve aussi le
     même bloc CONFIG. Modifiez celui du script.)
     ============================================================ */
  :root{
    /* ---- DARK (default) ---- */
    --ink:#0B0B0C;
    --surface:#151517;
    --surface-2:#1D1D20;
    --cream:#F4F1EA;
    --muted:#9C968C;
    --gold:#C9A24B;
    --gold-hi:#E7CC86;
    --gold-deep:#8F7330;
    --line:rgba(201,162,75,.20);
    --hairline:rgba(255,255,255,.06);
    --hero-mid:rgba(11,11,12,.65);
    --glow-1:rgba(201,162,75,.16);
    --glow-2:rgba(201,162,75,.07);
    --radius:18px;
    --maxw:460px;
    --display:'Archivo',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
  }

  /* ---- LIGHT — warm ivory palette tuned to the gold ---- */
  :root[data-theme="light"]{
    --ink:#F5F1E8;
    --surface:#FFFFFF;
    --surface-2:#F0EADB;
    --cream:#211F1A;
    --muted:#6E6A5E;
    --gold:#9C7C2E;
    --gold-hi:#C9A24B;
    --gold-deep:#6F5722;
    --line:rgba(143,115,48,.32);
    --hairline:rgba(40,33,15,.10);
    --hero-mid:rgba(245,241,232,.65);
    --glow-1:rgba(201,162,75,.20);
    --glow-2:rgba(201,162,75,.10);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--body);
    background-color:var(--ink);
    color:var(--cream);
    line-height:1.5;
    min-height:100vh;
    /* ambient backdrop */
    background-image:
      radial-gradient(120% 60% at 50% -5%, var(--glow-1), transparent 60%),
      radial-gradient(80% 50% at 50% 105%, var(--glow-2), transparent 70%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    transition:background-color .45s ease, color .45s ease;
  }

  .wrap{
    max-width:var(--maxw);
    margin:0 auto;
    padding:0 18px 48px;
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    margin:0 -18px 0;
    overflow:hidden;
  }
  .hero img{
    display:block;
    width:100%;
    height:auto;
  }
  .hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom, transparent 45%, var(--hero-mid) 80%, var(--ink) 100%);
    pointer-events:none;
    transition:background .45s ease;
  }

  /* ---------- SEAL (circular DM badge) ---------- */
  .seal{
    width:108px;height:108px;
    border-radius:50%;
    margin:-60px auto 0;
    position:relative;
    z-index:3;
    padding:6px;
    background:radial-gradient(circle at 50% 32%, #1a1a1c, #0c0c0d 78%);
    border:1.5px solid var(--gold);
    box-shadow:
      0 14px 30px -12px rgba(0,0,0,.85),
      0 0 0 5px var(--ink),
      0 0 0 6px rgba(201,162,75,.22),
      inset 0 0 16px rgba(0,0,0,.6);
  }
  .seal img{
    width:100%;height:100%;
    border-radius:50%;
    object-fit:cover;
    transform:scale(1.07);
    display:block;
  }

  .intro{
    text-align:center;
    margin-top:18px;
    padding:0 6px;
    position:relative;
    z-index:2;
  }
  .eyebrow{
    font-family:var(--display);
    font-weight:700;
    font-size:11px;
    letter-spacing:.34em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
  }
  .tagline{
    font-family:var(--display);
    font-style:italic;
    font-weight:800;
    font-size:clamp(20px,5.4vw,25px);
    line-height:1.18;
    letter-spacing:-.01em;
    color:var(--cream);
    max-width:20ch;
    margin:0 auto;
    text-wrap:balance;
  }

  /* ---------- SEAM DIVIDER (signature) ---------- */
  .seam{
    display:flex;
    align-items:center;
    gap:14px;
    margin:26px 2px;
  }
  .seam::before,.seam::after{
    content:"";
    flex:1;
    height:1px;
    background:linear-gradient(to var(--dir,right), transparent, var(--line));
  }
  .seam::after{--dir:left}
  .seam .joint{
    width:7px;height:7px;
    transform:rotate(45deg);
    border:1px solid var(--gold);
    background:rgba(201,162,75,.12);
    flex:0 0 auto;
  }
  .seam.label{gap:12px}
  .seam .txt{
    font-family:var(--display);
    font-weight:700;
    font-size:12px;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:var(--muted);
    flex:0 0 auto;
  }

  /* ---------- PRIMARY: SAVE CONTACT ---------- */
  .save{
    width:100%;
    border:none;
    cursor:pointer;
    border-radius:var(--radius);
    padding:18px 20px;
    display:flex;
    align-items:center;
    gap:14px;
    text-align:left;
    color:#221b07;
    background:linear-gradient(135deg,var(--gold-hi),var(--gold) 55%,var(--gold-deep));
    box-shadow:0 10px 30px -10px rgba(201,162,75,.55), inset 0 1px 0 rgba(255,255,255,.35);
    position:relative;
    overflow:hidden;
    margin-top:4px;
  }
  .save::after{ /* sheen */
    content:"";
    position:absolute;top:0;left:-60%;
    width:50%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
    transform:skewX(-18deg);
    animation:sheen 5.5s ease-in-out 1.2s infinite;
  }
  .save .ico{
    flex:0 0 auto;width:30px;height:30px;
  }
  .save .ico svg{width:30px;height:30px;stroke:#221b07}
  .save .stack{display:flex;flex-direction:column;line-height:1.15}
  .save .lab{
    font-family:var(--display);
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.04em;
    font-size:16px;
  }
  .save .sub{font-size:12.5px;font-weight:500;opacity:.78}

  /* ---------- QUICK ACTION GRID ---------- */
  .grid4{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:12px;
  }
  .act{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:7px;
    padding:14px 6px;
    border-radius:14px;
    background:var(--surface);
    border:1px solid var(--hairline);
    color:var(--cream);
    text-decoration:none;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .act svg{width:22px;height:22px;stroke:var(--gold);fill:none}
  .act span{font-size:11px;font-weight:500;letter-spacing:.01em;color:var(--muted)}
  .act:hover,.act:focus-visible{
    transform:translateY(-2px);
    border-color:var(--line);
    background:var(--surface-2);
  }

  /* ---------- SOCIAL ROW ---------- */
  .social{
    display:flex;
    gap:10px;
    margin-top:4px;
  }
  .social a{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    padding:13px;
    border-radius:14px;
    background:var(--surface);
    border:1px solid var(--hairline);
    color:var(--cream);
    text-decoration:none;
    font-size:12.5px;
    font-weight:500;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .social a svg{width:18px;height:18px;fill:var(--gold)}
  .social a:hover,.social a:focus-visible{
    transform:translateY(-2px);
    border-color:var(--line);
    background:var(--surface-2);
  }

  /* ---------- INFO CARDS ---------- */
  .card{
    background:var(--surface);
    border:1px solid var(--hairline);
    border-radius:var(--radius);
    padding:18px 18px;
    transition:background-color .45s ease, border-color .45s ease;
  }
  .hours{display:flex;flex-direction:column;gap:2px}
  .hrow{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:9px 0;
    border-bottom:1px solid var(--hairline);
  }
  .hrow:last-child{border-bottom:none}
  .hrow .d{font-size:14px;font-weight:500;color:var(--cream)}
  .hrow .h{font-size:13.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .hrow.closed .h{color:var(--gold-deep)}
  .hrow.today{}
  .hrow.today .d::after{
    content:"Aujourd'hui";
    display:inline-block;
    margin-left:8px;
    font-family:var(--display);
    font-size:9px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--gold);
    border:1px solid var(--line);
    border-radius:20px;
    padding:2px 7px;
    vertical-align:middle;
  }

  /* ---------- ADDRESS + MAP ---------- */
  .addr{
    display:flex;
    gap:12px;
    align-items:flex-start;
    margin-bottom:14px;
  }
  .addr svg{width:20px;height:20px;stroke:var(--gold);fill:none;flex:0 0 auto;margin-top:2px}
  .addr p{font-size:14px;color:var(--cream)}
  .addr .ph{color:var(--muted);font-style:italic}
  .mapbox{
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--hairline);
    line-height:0;
    background:var(--surface-2);
  }
  .mapbox iframe{width:100%;height:180px;border:0;filter:grayscale(.35) contrast(1.04)}
  .dirbtn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    margin-top:12px;
    padding:14px;
    border-radius:14px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--gold);
    text-decoration:none;
    font-family:var(--display);
    font-weight:700;
    font-size:13px;
    letter-spacing:.06em;
    text-transform:uppercase;
    transition:background .15s ease;
  }
  .dirbtn svg{width:18px;height:18px;stroke:var(--gold);fill:none}
  .dirbtn:hover,.dirbtn:focus-visible{background:rgba(201,162,75,.08)}

  /* ---------- GALLERY ---------- */
  .gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  .tile{
    position:relative;
    aspect-ratio:1/1;
    border-radius:14px;
    overflow:hidden;
    background:
      linear-gradient(135deg,var(--surface-2),var(--surface));
    border:1px solid var(--hairline);
  }
  .tile img{width:100%;height:100%;object-fit:cover;display:block}
  .tile.wide{grid-column:1 / -1;aspect-ratio:16/10}
  .tile .empty{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:8px;color:var(--muted);
  }
  .tile .empty svg{width:24px;height:24px;stroke:var(--gold);opacity:.6;fill:none}
  .tile .empty span{font-size:10.5px;letter-spacing:.04em}

  /* ---------- SHARE + FOOTER ---------- */
  .share{
    width:100%;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:15px;
    border-radius:var(--radius);
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--cream);
    font-family:var(--display);
    font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;
    transition:background .15s ease;
  }
  .share svg{width:18px;height:18px;stroke:var(--gold);fill:none}
  .share:hover,.share:focus-visible{background:var(--surface-2)}

  footer{
    text-align:center;
    margin-top:30px;
    color:var(--muted);
  }
  footer .mark{
    font-family:var(--display);
    font-style:italic;
    font-weight:900;
    font-size:15px;
    letter-spacing:.02em;
    color:var(--cream);
  }
  footer .mark b{color:var(--gold);font-style:normal}
  footer .fine{font-size:11px;margin-top:6px;letter-spacing:.02em}

  /* ---------- TOAST ---------- */
  .toast{
    position:fixed;
    left:50%;bottom:24px;
    transform:translate(-50%,140%);
    background:var(--gold);
    color:#221b07;
    font-weight:600;font-size:13.5px;
    padding:12px 20px;
    border-radius:30px;
    box-shadow:0 12px 30px -8px rgba(0,0,0,.6);
    z-index:50;
    transition:transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .toast.show{transform:translate(-50%,0)}

  /* ---------- THEME TOGGLE ---------- */
  .theme-toggle{
    position:fixed;
    top:14px;right:14px;
    z-index:60;
    width:66px;height:33px;
    padding:0;
    border-radius:999px;
    border:1px solid var(--line);
    background:color-mix(in srgb, var(--surface) 80%, transparent);
    cursor:pointer;
    -webkit-backdrop-filter:blur(10px) saturate(1.2);
    backdrop-filter:blur(10px) saturate(1.2);
    box-shadow:0 8px 22px -10px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.12);
    transition:background-color .45s ease, border-color .45s ease, box-shadow .25s ease;
    animation:rise .6s cubic-bezier(.2,.8,.2,1) both;
  }
  .theme-toggle:hover{box-shadow:0 10px 26px -10px rgba(0,0,0,.6), 0 0 0 4px rgba(201,162,75,.12)}
  .theme-toggle:active .tt-thumb{width:30px}
  .tt-ico{
    position:absolute;top:50%;
    width:14px;height:14px;
    transform:translateY(-50%);
    color:var(--muted);
    opacity:.6;
    pointer-events:none;
    transition:opacity .3s ease, color .45s ease;
  }
  .tt-ico svg{width:100%;height:100%;display:block;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tt-moon{left:9px}
  .tt-sun{right:9px}
  .tt-thumb{
    position:absolute;top:3px;left:3px;
    width:27px;height:27px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--gold-hi),var(--gold) 58%,var(--gold-deep));
    box-shadow:0 3px 9px -1px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.55);
    display:grid;place-items:center;
    transition:transform .42s cubic-bezier(.34,1.56,.64,1), width .2s ease, background .45s ease;
  }
  :root[data-theme="light"] .tt-thumb{transform:translateX(33px)}
  .tt-thumb svg{
    position:absolute;
    width:15px;height:15px;
    stroke:#221b07;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;
    transition:opacity .3s ease, transform .42s cubic-bezier(.34,1.56,.64,1);
  }
  .tt-thumb .icon-sun{opacity:0;transform:rotate(-90deg) scale(.4)}
  .tt-thumb .icon-moon{opacity:1;transform:rotate(0) scale(1)}
  :root[data-theme="light"] .tt-thumb .icon-sun{opacity:1;transform:rotate(0) scale(1)}
  :root[data-theme="light"] .tt-thumb .icon-moon{opacity:0;transform:rotate(90deg) scale(.4)}

  /* ---------- LOAD ANIMATION ---------- */
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes sheen{0%,18%{left:-60%}38%,100%{left:130%}}
  .reveal{opacity:0;animation:rise .6s cubic-bezier(.2,.8,.2,1) forwards}
  .reveal.d1{animation-delay:.05s}
  .reveal.d2{animation-delay:.12s}
  .reveal.d3{animation-delay:.19s}
  .reveal.d4{animation-delay:.26s}
  .reveal.d5{animation-delay:.33s}
  .reveal.d6{animation-delay:.40s}
  .reveal.d7{animation-delay:.47s}

  :focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:8px}

  @media (prefers-reduced-motion:reduce){
    .reveal{animation:none;opacity:1}
    .save::after{animation:none;display:none}
    .toast{transition:none}
    .theme-toggle{animation:none}
    .tt-thumb,.tt-thumb svg{transition:none}
    *{scroll-behavior:auto!important}
  }
</style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Changer de thème (clair / sombre)" title="Changer de thème">
    <span class="tt-ico tt-moon" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </span>
    <span class="tt-ico tt-sun" aria-hidden="true">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    </span>
    <span class="tt-thumb" aria-hidden="true">
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    </span>
  </button>

  <main class="wrap">

const $ = id => document.getElementById(id);

/* theme toggle (initial theme already applied in <head> to avoid flash) */
(function(){
  const root = document.documentElement;
  const btn = $("themeToggle");
  const meta = document.querySelector('meta[name="theme-color"]');
  const KEY = "dm-theme";
  const COLORS = { dark:"#0B0B0C", light:"#F5F1E8" };
  function sync(theme){
    btn.setAttribute("aria-pressed", String(theme === "light"));
    if(meta) meta.setAttribute("content", COLORS[theme] || COLORS.dark);
  }
  sync(root.getAttribute("data-theme") === "light" ? "light" : "dark");
  btn.addEventListener("click", ()=>{
    const next = root.getAttribute("data-theme") === "light" ? "dark" : "light";
    root.setAttribute("data-theme", next);
    sync(next);
    try{ localStorage.setItem(KEY, next); }catch(e){}
  });
  /* follow the OS theme only while the user hasn't made an explicit choice */
  if(window.matchMedia){
    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", e=>{
      let saved; try{ saved = localStorage.getItem(KEY); }catch(_){}
      if(saved) return;
      const t = e.matches ? "light" : "dark";
      root.setAttribute("data-theme", t);
      sync(t);
    });
  }
})();

/* toast */
let toastTimer;
function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"),2600);
}

/* vCard download */
function vcardEscape(s){return String(s).replace(/[\\,;]/g,m=>"\\"+m);}
function buildVCard(){
  const c = CONFIG;
  const lines = [
    "BEGIN:VCARD","VERSION:3.0",
    "N:;"+vcardEscape(c.brand)+";;;",
    "FN:"+vcardEscape(c.brand),
    "ORG:"+vcardEscape(c.brand),
    "TEL;TYPE=CELL,VOICE:"+c.phoneTel,
    "TEL;TYPE=WhatsApp:+"+c.whatsapp,
  ];
  if(c.email && !/À COMPLÉTER/i.test(c.email)) lines.push("EMAIL;TYPE=INTERNET:"+c.email);
  if(c.website) lines.push("URL:"+c.website);
  if(c.address && !/À COMPLÉTER/i.test(c.address)) lines.push("ADR;TYPE=WORK:;;"+vcardEscape(c.address)+";;;;");
  if(c.social.instagram) lines.push("X-SOCIALPROFILE;TYPE=instagram:"+c.social.instagram);
  if(c.social.facebook)  lines.push("X-SOCIALPROFILE;TYPE=facebook:"+c.social.facebook);
  lines.push("NOTE:"+vcardEscape("Mobilier & décoration"));
  lines.push("END:VCARD");
  return lines.join("\r\n");
}
$("saveBtn").addEventListener("click",()=>{
  const blob = new Blob([buildVCard()],{type:"text/vcard;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "Dizayno-Mobilya.vcf";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast("Contact enregistré ✓");
});

$("shareBtn").addEventListener("click",async ()=>{
  const data = { title:CONFIG.brand, text:"Découvrez "+CONFIG.brand+" — mobilier & décoration", url:location.href };
  try{
    if(navigator.share){ await navigator.share(data); }
    else { await navigator.clipboard.writeText(location.href); toast("Lien copié ✓"); }
  }catch(e){/* user cancelled */}
});
