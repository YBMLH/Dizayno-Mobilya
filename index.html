<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dizayno Mobilya — Carte de visite</title>
<meta name="description" content="Dizayno Mobilya — Mobilier & décoration. Enregistrez notre contact, appelez-nous ou visitez notre showroom.">
<meta name="theme-color" content="#0B0B0C">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,500;0,700;0,800;0,900;1,800;1,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     ▼▼▼  VOS INFORMATIONS — modifiez uniquement ce bloc  ▼▼▼
     (Tout en bas de page, dans <script>, se trouve aussi le
     même bloc CONFIG. Modifiez celui du script.)
     ============================================================ */
  :root{
    --ink:#0B0B0C;
    --surface:#151517;
    --surface-2:#1D1D20;
    --cream:#F4F1EA;
    --muted:#9C968C;
    --gold:#C9A24B;
    --gold-hi:#E7CC86;
    --gold-deep:#8F7330;
    --line:rgba(201,162,75,.20);
    --radius:18px;
    --maxw:460px;
    --display:'Archivo',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--body);
    background:var(--ink);
    color:var(--cream);
    line-height:1.5;
    min-height:100vh;
    /* ambient backdrop */
    background-image:
      radial-gradient(120% 60% at 50% -5%, rgba(201,162,75,.16), transparent 60%),
      radial-gradient(80% 50% at 50% 105%, rgba(201,162,75,.07), transparent 70%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    max-width:var(--maxw);
    margin:0 auto;
    padding:0 18px 48px;
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    margin:0 -18px 0;
    overflow:hidden;
  }
  .hero img{
    display:block;
    width:100%;
    height:auto;
  }
  .hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom, rgba(11,11,12,0) 45%, rgba(11,11,12,.65) 80%, var(--ink) 100%);
    pointer-events:none;
  }

  /* ---------- SEAL (circular DM badge) ---------- */
  .seal{
    width:108px;height:108px;
    border-radius:50%;
    margin:-60px auto 0;
    position:relative;
    z-index:3;
    padding:6px;
    background:radial-gradient(circle at 50% 32%, #1a1a1c, #0c0c0d 78%);
    border:1.5px solid var(--gold);
    box-shadow:
      0 14px 30px -12px rgba(0,0,0,.85),
      0 0 0 5px var(--ink),
      0 0 0 6px rgba(201,162,75,.22),
      inset 0 0 16px rgba(0,0,0,.6);
  }
  .seal img{
    width:100%;height:100%;
    border-radius:50%;
    object-fit:cover;
    transform:scale(1.07);
    display:block;
  }

  .intro{
    text-align:center;
    margin-top:18px;
    padding:0 6px;
    position:relative;
    z-index:2;
  }
  .eyebrow{
    font-family:var(--display);
    font-weight:700;
    font-size:11px;
    letter-spacing:.34em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
  }
  .tagline{
    font-family:var(--display);
    font-style:italic;
    font-weight:800;
    font-size:clamp(20px,5.4vw,25px);
    line-height:1.18;
    letter-spacing:-.01em;
    color:var(--cream);
    max-width:20ch;
    margin:0 auto;
    text-wrap:balance;
  }

  /* ---------- SEAM DIVIDER (signature) ---------- */
  .seam{
    display:flex;
    align-items:center;
    gap:14px;
    margin:26px 2px;
  }
  .seam::before,.seam::after{
    content:"";
    flex:1;
    height:1px;
    background:linear-gradient(to var(--dir,right), transparent, var(--line));
  }
  .seam::after{--dir:left}
  .seam .joint{
    width:7px;height:7px;
    transform:rotate(45deg);
    border:1px solid var(--gold);
    background:rgba(201,162,75,.12);
    flex:0 0 auto;
  }
  .seam.label{gap:12px}
  .seam .txt{
    font-family:var(--display);
    font-weight:700;
    font-size:12px;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:var(--muted);
    flex:0 0 auto;
  }

  /* ---------- PRIMARY: SAVE CONTACT ---------- */
  .save{
    width:100%;
    border:none;
    cursor:pointer;
    border-radius:var(--radius);
    padding:18px 20px;
    display:flex;
    align-items:center;
    gap:14px;
    text-align:left;
    color:#221b07;
    background:linear-gradient(135deg,var(--gold-hi),var(--gold) 55%,var(--gold-deep));
    box-shadow:0 10px 30px -10px rgba(201,162,75,.55), inset 0 1px 0 rgba(255,255,255,.35);
    position:relative;
    overflow:hidden;
    margin-top:4px;
  }
  .save::after{ /* sheen */
    content:"";
    position:absolute;top:0;left:-60%;
    width:50%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
    transform:skewX(-18deg);
    animation:sheen 5.5s ease-in-out 1.2s infinite;
  }
  .save .ico{
    flex:0 0 auto;width:30px;height:30px;
  }
  .save .ico svg{width:30px;height:30px;stroke:#221b07}
  .save .stack{display:flex;flex-direction:column;line-height:1.15}
  .save .lab{
    font-family:var(--display);
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.04em;
    font-size:16px;
  }
  .save .sub{font-size:12.5px;font-weight:500;opacity:.78}

  /* ---------- QUICK ACTION GRID ---------- */
  .grid4{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:12px;
  }
  .act{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:7px;
    padding:14px 6px;
    border-radius:14px;
    background:var(--surface);
    border:1px solid rgba(255,255,255,.06);
    color:var(--cream);
    text-decoration:none;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .act svg{width:22px;height:22px;stroke:var(--gold);fill:none}
  .act span{font-size:11px;font-weight:500;letter-spacing:.01em;color:var(--muted)}
  .act:hover,.act:focus-visible{
    transform:translateY(-2px);
    border-color:var(--line);
    background:var(--surface-2);
  }

  /* ---------- SOCIAL ROW ---------- */
  .social{
    display:flex;
    gap:10px;
    margin-top:4px;
  }
  .social a{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    padding:13px;
    border-radius:14px;
    background:var(--surface);
    border:1px solid rgba(255,255,255,.06);
    color:var(--cream);
    text-decoration:none;
    font-size:12.5px;
    font-weight:500;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .social a svg{width:18px;height:18px;fill:var(--gold)}
  .social a:hover,.social a:focus-visible{
    transform:translateY(-2px);
    border-color:var(--line);
    background:var(--surface-2);
  }

  /* ---------- INFO CARDS ---------- */
  .card{
    background:var(--surface);
    border:1px solid rgba(255,255,255,.06);
    border-radius:var(--radius);
    padding:18px 18px;
  }
  .hours{display:flex;flex-direction:column;gap:2px}
  .hrow{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:9px 0;
    border-bottom:1px solid rgba(255,255,255,.05);
  }
  .hrow:last-child{border-bottom:none}
  .hrow .d{font-size:14px;font-weight:500;color:var(--cream)}
  .hrow .h{font-size:13.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .hrow.closed .h{color:var(--gold-deep)}
  .hrow.today{}
  .hrow.today .d::after{
    content:"Aujourd'hui";
    display:inline-block;
    margin-left:8px;
    font-family:var(--display);
    font-size:9px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--gold);
    border:1px solid var(--line);
    border-radius:20px;
    padding:2px 7px;
    vertical-align:middle;
  }

  /* ---------- ADDRESS + MAP ---------- */
  .addr{
    display:flex;
    gap:12px;
    align-items:flex-start;
    margin-bottom:14px;
  }
  .addr svg{width:20px;height:20px;stroke:var(--gold);fill:none;flex:0 0 auto;margin-top:2px}
  .addr p{font-size:14px;color:var(--cream)}
  .addr .ph{color:var(--muted);font-style:italic}
  .mapbox{
    border-radius:14px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.07);
    line-height:0;
    background:var(--surface-2);
  }
  .mapbox iframe{width:100%;height:180px;border:0;filter:grayscale(.35) contrast(1.04)}
  .dirbtn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    margin-top:12px;
    padding:14px;
    border-radius:14px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--gold);
    text-decoration:none;
    font-family:var(--display);
    font-weight:700;
    font-size:13px;
    letter-spacing:.06em;
    text-transform:uppercase;
    transition:background .15s ease;
  }
  .dirbtn svg{width:18px;height:18px;stroke:var(--gold);fill:none}
  .dirbtn:hover,.dirbtn:focus-visible{background:rgba(201,162,75,.08)}

  /* ---------- GALLERY ---------- */
  .gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  .tile{
    position:relative;
    aspect-ratio:1/1;
    border-radius:14px;
    overflow:hidden;
    background:
      linear-gradient(135deg,var(--surface-2),var(--surface));
    border:1px solid rgba(255,255,255,.06);
  }
  .tile img{width:100%;height:100%;object-fit:cover;display:block}
  .tile.wide{grid-column:1 / -1;aspect-ratio:16/10}
  .tile .empty{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:8px;color:var(--muted);
  }
  .tile .empty svg{width:24px;height:24px;stroke:var(--gold);opacity:.6;fill:none}
  .tile .empty span{font-size:10.5px;letter-spacing:.04em}

  /* ---------- SHARE + FOOTER ---------- */
  .share{
    width:100%;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:15px;
    border-radius:var(--radius);
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--cream);
    font-family:var(--display);
    font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;
    transition:background .15s ease;
  }
  .share svg{width:18px;height:18px;stroke:var(--gold);fill:none}
  .share:hover,.share:focus-visible{background:var(--surface-2)}

  footer{
    text-align:center;
    margin-top:30px;
    color:var(--muted);
  }
  footer .mark{
    font-family:var(--display);
    font-style:italic;
    font-weight:900;
    font-size:15px;
    letter-spacing:.02em;
    color:var(--cream);
  }
  footer .mark b{color:var(--gold);font-style:normal}
  footer .fine{font-size:11px;margin-top:6px;letter-spacing:.02em}

  /* ---------- TOAST ---------- */
  .toast{
    position:fixed;
    left:50%;bottom:24px;
    transform:translate(-50%,140%);
    background:var(--gold);
    color:#221b07;
    font-weight:600;font-size:13.5px;
    padding:12px 20px;
    border-radius:30px;
    box-shadow:0 12px 30px -8px rgba(0,0,0,.6);
    z-index:50;
    transition:transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .toast.show{transform:translate(-50%,0)}

  /* ---------- LOAD ANIMATION ---------- */
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes sheen{0%,18%{left:-60%}38%,100%{left:130%}}
  .reveal{opacity:0;animation:rise .6s cubic-bezier(.2,.8,.2,1) forwards}
  .reveal.d1{animation-delay:.05s}
  .reveal.d2{animation-delay:.12s}
  .reveal.d3{animation-delay:.19s}
  .reveal.d4{animation-delay:.26s}
  .reveal.d5{animation-delay:.33s}
  .reveal.d6{animation-delay:.40s}
  .reveal.d7{animation-delay:.47s}

  :focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:8px}

  @media (prefers-reduced-motion:reduce){
    .reveal{animation:none;opacity:1}
    .save::after{animation:none;display:none}
    .toast{transition:none}
    *{scroll-behavior:auto!important}
  }
</style>
</head>

const $ = id => document.getElementById(id);

/* fill text */
$("eyebrow").textContent = CONFIG.eyebrow;
$("tagline").textContent = CONFIG.tagline;
$("saveSub").textContent = "Ajoutez " + CONFIG.brand + " à vos contacts";

/* quick actions */
$("callLink").href = "tel:" + CONFIG.phoneTel;
$("waLink").href   = "https://wa.me/" + CONFIG.whatsapp + "?text=" + encodeURIComponent(CONFIG.whatsappMsg);
const emailMissing = !CONFIG.email || /À COMPLÉTER/i.test(CONFIG.email);
if(emailMissing){
  $("mailLink").remove();
  document.querySelector(".grid4").style.gridTemplateColumns = "repeat(3,1fr)";
}else{
  $("mailLink").href = "mailto:" + CONFIG.email;
}

/* directions: exact coords > exact maps link > text query */
let dirURL;
if(CONFIG.coords){
  dirURL = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(CONFIG.coords);
}else if(CONFIG.mapsLink){
  dirURL = CONFIG.mapsLink;
}else{
  dirURL = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(CONFIG.mapsQuery);
}
$("dirLink").href = dirURL;
$("dirBtn2").href = dirURL;

/* map embed (no API key needed): exact coords pin if available */
const mapQ = CONFIG.coords ? CONFIG.coords : CONFIG.mapsQuery;
$("mapFrame").src = "https://www.google.com/maps?q=" + encodeURIComponent(mapQ) + "&z=16&output=embed";

/* address */
$("addrText").innerHTML = CONFIG.address.includes("À COMPLÉTER")
  ? '<span class="ph">' + CONFIG.address + '</span>'
  : CONFIG.address;

  const row = document.createElement("div");
  row.className = "hrow" + (r.closed?" closed":"") + (r.dow===today?" today":"");
  row.innerHTML = '<span class="d">'+r.day+'</span><span class="h">'+r.h+'</span>';
  hoursEl.appendChild(row);
});

/* gallery */
const galleryEl = $("gallery");
CONFIG.products.forEach(p=>{
  const t = document.createElement("div");
  t.className = "tile" + (p.wide ? " wide" : "");
  if(p.img){
    t.innerHTML = '<img src="'+p.img+'" alt="'+(p.label||"Création Dizayno Mobilya")+'" loading="lazy">';
  } else {
    t.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span>'+(p.label||"Photo à venir")+'</span></div>';
  }
  galleryEl.appendChild(t);
});

/* toast */
let toastTimer;
function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"),2600);
}

/* vCard download */
function vcardEscape(s){return String(s).replace(/[\\,;]/g,m=>"\\"+m);}
function buildVCard(){
  const c = CONFIG;
  const lines = [
    "BEGIN:VCARD","VERSION:3.0",
    "N:;"+vcardEscape(c.brand)+";;;",
    "FN:"+vcardEscape(c.brand),
    "ORG:"+vcardEscape(c.brand),
    "TEL;TYPE=CELL,VOICE:"+c.phoneTel,
    "TEL;TYPE=WhatsApp:+"+c.whatsapp,
  ];
  if(c.email && !/À COMPLÉTER/i.test(c.email)) lines.push("EMAIL;TYPE=INTERNET:"+c.email);
  if(c.website) lines.push("URL:"+c.website);
  if(c.address && !/À COMPLÉTER/i.test(c.address)) lines.push("ADR;TYPE=WORK:;;"+vcardEscape(c.address)+";;;;");
  if(c.social.instagram) lines.push("X-SOCIALPROFILE;TYPE=instagram:"+c.social.instagram);
  if(c.social.facebook)  lines.push("X-SOCIALPROFILE;TYPE=facebook:"+c.social.facebook);
  lines.push("NOTE:"+vcardEscape("Mobilier & décoration"));
  lines.push("END:VCARD");
  return lines.join("\r\n");
}
$("saveBtn").addEventListener("click",()=>{
  const blob = new Blob([buildVCard()],{type:"text/vcard;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "Dizayno-Mobilya.vcf";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast("Contact enregistré ✓");
});

/* share */
$("shareBtn").addEventListener("click",async ()=>{
  const data = { title:CONFIG.brand, text:"Découvrez "+CONFIG.brand+" — mobilier & décoration", url:location.href };
  try{
    if(navigator.share){ await navigator.share(data); }
    else { await navigator.clipboard.writeText(location.href); toast("Lien copié ✓"); }
  }catch(e){/* user cancelled */}
});
</script>
